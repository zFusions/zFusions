name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: generate-snake-game-from-github-contribution-grid
        uses: Platane/snk@v3.5.0
        with:
          github_user_name: zfusions
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=FFFFFF&color_dots=#0d0d0d,#1a1a1a,#2a2a2a,#444444,#ffffff
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=FFFFFF

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
